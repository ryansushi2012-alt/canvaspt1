<!DOCTYPE html>
<html>
<head>
    <title>Mini Game</title>
    <style>
        body { background: #222; color: white; text-align: center; font-family: sans-serif; margin: 0; overflow: hidden; }
        canvas { background: #70c5ce; display: block; margin: 20px auto; border: 4px solid #fff; border-radius: 8px; }
        #score { font-size: 30px; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="score">Score: 0</div>
    <canvas id="birdCanvas" width="400" height="500"></canvas>
    <p>Press SPACEBAR or CLICK to Fly</p>

    <script>
        const canvas = document.getElementById("birdCanvas");
        const ctx = canvas.getContext("2d");
        let score = 0;

        let bird = { x: 50, y: 150, width: 20, height: 20, gravity: 0.6, lift: -10, velocity: 0 };
        let pipes = [];
        let frameCount = 0;

        function ArrayPipe() {
            this.top = Math.random() * (canvas.height / 2);
            this.bottom = Math.random() * (canvas.height / 2);
            this.x = canvas.width;
            this.width = 40;
            this.speed = 2;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Bird
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;
            ctx.fillStyle = "#ffde22";
            ctx.fillRect(bird.x, bird.y, bird.width, bird.height);

            if (bird.y > canvas.height || bird.y < 0) reset();

            // Pipes
            if (frameCount % 100 === 0) pipes.push(new ArrayPipe());
            
            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= pipes[i].speed;
                ctx.fillStyle = "#73bf2e";
                ctx.fillRect(pipes[i].x, 0, pipes[i].width, pipes[i].top);
                ctx.fillRect(pipes[i].x, canvas.height - pipes[i].bottom, pipes[i].width, pipes[i].bottom);

                if (bird.x < pipes[i].x + pipes[i].width && bird.x + bird.width > pipes[i].x &&
                    (bird.y < pipes[i].top || bird.y + bird.height > canvas.height - pipes[i].bottom)) {
                    reset();
                }

                if (pipes[i].x + pipes[i].width < 0) {
                    pipes.splice(i, 1);
                    score++;
                    document.getElementById("score").innerText = "Score: " + score;
                }
            }
            frameCount++;
            requestAnimationFrame(draw);
        }

        function reset() {
            bird.y = 150; bird.velocity = 0; pipes = []; score = 0; frameCount = 0;
            document.getElementById("score").innerText = "Score: 0";
        }

        window.addEventListener("keydown", (e) => { if(e.code === "Space") bird.velocity = bird.lift; });
        canvas.addEventListener("click", () => { bird.velocity = bird.lift; });
        draw();
    </script>
</body>
</html>
