<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #121212; color: white; text-align: center; }
        header { background-color: #1f1f1f; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h1 { margin: 0; color: #00adb5; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .card { background-color: #222831; border-radius: 8px; padding: 30px 20px; cursor: pointer; transition: 0.2s; border: 1px solid #393e46; }
        .card:hover { transform: translateY(-5px); background-color: #393e46; border-color: #00adb5; }
        .card h3 { margin: 0; font-size: 20px; }
        #game-container { display: none; width: 100%; max-width: 900px; height: 650px; margin: 20px auto; }
        iframe { width: 100%; height: 100%; border: 2px solid #00adb5; border-radius: 8px; background: #000; }
        .back-btn { display: none; margin: 20px auto; padding: 10px 25px; background-color: #00adb5; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .back-btn:hover { background-color: #007c82; }
    </style>
</head>
<body>

    <header>
        <h1 id="page-title">Workspace Directory</h1>
    </header>

    <div class="grid" id="menu-grid">
        <div class="card" onclick="playGame('game1.html', 'Mini Game 1')">
            <h3>Module 1</h3>
        </div>
    </div>

    <button class="back-btn" id="back-button" onclick="closeGame()">← Back to Dashboard</button>
    <div id="game-container">
        <iframe id="game-frame" src="" allowfullscreen></iframe>
    </div>

    <script>
        function playGame(url, name) {
            document.getElementById('menu-grid').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('back-button').style.display = 'block';
            document.getElementById('game-frame').src = url;
            document.getElementById('page-title').innerText = name;
        }
        function closeGame() {
            document.getElementById('menu-grid').style.display = 'grid';
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('back-button').style.display = 'none';
            document.getElementById('game-frame').src = '';
            document.getElementById('page-title').innerText = "Workspace Directory";
        }
    </script>
</body>
</html>
